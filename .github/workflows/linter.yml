---
name: Lint

on: # yamllint disable-line rule:truthy
  # push: null
  pull_request: null

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # python-version: ["3.12", "3.13", "3.14"]
        python-version: ["3.12"]
        os: ["windows-latest", "ubuntu-latest", "macos-latest"]

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        # Pin to a full release; Astral no longer publishes moving major tags.
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # --locked fails the build if uv.lock is out of date with pyproject.toml
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            pre-commit-${{ runner.os }}-py${{ matrix.python-version }}-${{
            hashFiles('.pre-commit-config.yaml') }}

      - name: Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
